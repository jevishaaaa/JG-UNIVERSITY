<svg
  width="100%"
  viewBox="0 0 680 260"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <title>JG University — Flame of Knowledge</title>

  <defs>
    <!-- Flame -->
    <linearGradient id="flameOuter" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="45%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <linearGradient id="flameInner" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>

    <!-- JG Gradient -->
    <linearGradient id="jgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Flame -->
  <g filter="url(#glow)">
    <path
      d="M270 200 L298 155 L318 172 L302 128 L326 140
      L302 90 L280 110 L270 80 L260 110 L238 90
      L214 140 L238 128 L222 172 L242 155 Z"
      fill="url(#flameOuter)"
      opacity="0.95"
    />

    <path
      d="M270 185 L286 158 L298 168 L286 138 L304 147
      L286 108 L274 122 L270 100 L266 122 L254 108
      L236 147 L254 138 L242 168 L254 158 Z"
      fill="url(#flameInner)"
      opacity="0.65"
    />
  </g>

  <!-- JG -->
  <text
    x="360"
    y="168"
    fill="url(#jgGrad)"
    font-size="96"
    font-weight="700"
    letter-spacing="4"
    font-family="Georgia, serif"
  >
    JG
  </text>

  <!-- UNIVERSITY -->
  <text
    x="362"
    y="198"
    fill="#9ca3af"
    font-size="20"
    font-weight="300"
    letter-spacing="12"
    font-family="Arial, sans-serif"
  >
    UNIVERSITY
  </text>

  <!-- Divider -->
  <line
    x1="362"
    y1="210"
    x2="594"
    y2="210"
    stroke="#f97316"
    stroke-width="1"
    opacity="0.35"
  />

  <!-- Tagline -->
  <text
    x="362"
    y="228"
    fill="#6b7280"
    font-size="11"
    font-weight="600"
    letter-spacing="4"
    font-family="Arial, sans-serif"
  >
    KNOWLEDGE BEYOND BOOKS
  </text>
</svg>